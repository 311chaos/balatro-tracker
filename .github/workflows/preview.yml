name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  # ── Deploy preview when PR is opened or updated ────────────────────────────
  deploy-preview:
    name: Migrate → Deploy Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Creates an isolated Neon branch off main for this PR.
      # Branch name is stable across PR updates so re-runs reuse it.
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      # Run migrations against the branch using the direct connection
      - name: Run migrations on branch
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}

      # Build locally so we can inject the branch DATABASE_URL as a
      # runtime env var in the deploy step. Using --prebuilt avoids a
      # second remote build that would use the production DB URL.
      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: npx vercel build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          url=$(npx vercel deploy --prebuilt \
            --env DATABASE_URL="${{ steps.neon.outputs.db_url_with_pooler }}" \
            --env DATABASE_URL_UNPOOLED="${{ steps.neon.outputs.db_url }}")
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('<!-- vercel-preview -->')
            );
            const body = `<!-- vercel-preview -->
            **Preview deployment ready**

            | | |
            |---|---|
            | URL | ${{ steps.deploy.outputs.url }} |
            | Commit | \`${{ github.event.pull_request.head.sha }}\` |
            | DB branch | \`preview/pr-${{ github.event.pull_request.number }}\` |
            `;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Clean up Neon branch when PR is closed ─────────────────────────────────
  cleanup:
    name: Delete Neon branch
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete Neon preview branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
